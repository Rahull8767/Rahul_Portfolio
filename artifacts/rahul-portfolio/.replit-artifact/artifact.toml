kind = "web"
previewPath = "/"
title = "Rahul Tembhare Portfolio"
version = "1.0.0"
id = "artifacts/rahul-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24836

[services.development]
run = "pnpm --filter @workspace/rahul-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rahul-portfolio", "run", "build" ]
publicDir = "artifacts/rahul-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24836"
BASE_PATH = "/"
