    <meta name="theme-color" content="#00f5ff" />
    <!-- Apply dark mode before React boots to prevent white flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var isDark = saved ? saved === 'dark' : true;
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Hard fallback: prevent white flash before CSS loads */
      html, body, #root {
        background-color: #080d14;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
